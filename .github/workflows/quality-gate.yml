name: Quality Gate

on:
  pull_request:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  quality-gate:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[align]"
          pip install pytest pytest-cov

      - name: Run quality gate (pytest + coverage)
        shell: pwsh
        run: |
          python scripts/quality_gate.py --coverage-min 62 --output-dir doc/audit/latest_quality_gate

      - name: Run E2E pipeline tests (normalize → segment → export)
        shell: pwsh
        run: |
          $env:HIMYC_PROJECT_PATH = "$env:RUNNER_TEMP\himyc-e2e"
          pytest tests/test_e2e_pipeline.py -v

      - name: Run checklist E2E assist (targeted)
        shell: pwsh
        run: |
          python scripts/e2e_checklist_assist.py --skip-precheck --output-dir doc/audit/latest_checklist_e2e_assist

      - name: Upload quality-gate artifacts
        uses: actions/upload-artifact@v4
        with:
          name: quality-gate-artifacts
          path: |
            doc/audit/latest_quality_gate/**
            doc/audit/latest_checklist_e2e_assist/**
