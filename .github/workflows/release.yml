# Build .exe (Windows) et .app (macOS) puis publier en release
# Déclenché au push d'un tag v* (ex. v0.2.0)
name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # requis pour créer la release et uploader l’asset .exe

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[align]"
          pip install pyinstaller

      - name: Build .exe
        run: |
          pyinstaller --noconfirm HowIMetYourCorpus.spec

      - name: Upload .exe to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: dist/HowIMetYourCorpus.exe
          fail_on_unmatched_files: true
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate .icns icon
        run: |
          chmod +x scripts/macos/make_icns.sh
          ./scripts/macos/make_icns.sh

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[align]"
          pip install pyinstaller

      - name: Build .app
        run: |
          pyinstaller --noconfirm HowIMetYourCorpus.spec

      - name: Package .app
        run: |
          set -euo pipefail
          app_path="$(find dist -maxdepth 1 -type d -name '*.app' | head -n 1 || true)"
          if [ -z "$app_path" ]; then
            app_path="$(find dist -maxdepth 1 -type d -name 'HowIMetYourCorpus*' | head -n 1 || true)"
          fi
          if [ -z "$app_path" ]; then
            echo "No app bundle found in dist/"
            ls -la dist || true
            exit 1
          fi
          zip_path="dist/HowIMetYourCorpus-macos.app.zip"
          ditto -c -k --sequesterRsrc --keepParent "$app_path" "$zip_path"
          echo "APP_PATH=$app_path" >> "$GITHUB_ENV"
          echo "ZIP_PATH=$zip_path" >> "$GITHUB_ENV"

      - name: Upload .app zip to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: ${{ env.ZIP_PATH }}
          fail_on_unmatched_files: true
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
